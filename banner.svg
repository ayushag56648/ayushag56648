<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="100%">
  <defs>
    <!-- Dark Charcoal Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1117" />
      <stop offset="100%" stop-color="#161b22" />
    </linearGradient>

    <!-- Frosted Glass Gradient -->
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.01)" />
    </linearGradient>

    <!-- Cyan Scanning Line Gradient -->
    <linearGradient id="scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0, 229, 255, 0)" />
      <stop offset="50%" stop-color="rgba(0, 229, 255, 0.15)" />
      <stop offset="100%" stop-color="rgba(0, 229, 255, 0)" />
    </linearGradient>

    <!-- Typing Animation Clip Path -->
    <clipPath id="typing-clip">
      <rect x="0" y="0" width="0" height="300">
        <animate attributeName="width" values="0;850" dur="2s" fill="freeze" calcMode="spline" keyTimes="0; 1" keySplines="0.25 0.1 0.25 1" />
      </rect>
    </clipPath>
  </defs>

  <!-- Base Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Animated Cyan Scanning Line -->
  <rect width="150" height="300" fill="url(#scan)">
    <animate attributeName="x" values="-200;900;-200" dur="8s" repeatCount="indefinite" />
  </rect>

  <!-- Holographic Network Graph (Lines) -->
  <g stroke="rgba(99, 102, 241, 0.3)" stroke-width="1.5" fill="none">
    <path d="M100 50 L220 120 L150 250 L40 180 Z" />
    <path d="M700 80 L800 150 L650 280 L580 180 Z" />
    <path d="M220 120 L425 40 L580 180" />
    <path d="M150 250 L425 280 L650 280" stroke-dasharray="4 8" />
  </g>

  <!-- Holographic Glowing Nodes -->
  <g fill="#00E5FF">
    <circle cx="100" cy="50" r="3"><animate attributeName="r" values="3;6;3" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="120" r="4"><animate attributeName="r" values="4;7;4" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="250" r="3"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="80" r="4"><animate attributeName="r" values="4;6;4" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="580" cy="180" r="3"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="425" cy="40" r="2"><animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Floating Glass Hexagon: Systems -->
  <g stroke="rgba(0, 229, 255, 0.3)" stroke-width="1" fill="rgba(0, 229, 255, 0.04)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-15; 0,0" dur="6s" repeatCount="indefinite" />
    <polygon points="70,90 90,90 100,107.3 90,124.6 70,124.6 60,107.3" />
    <text x="80" y="111" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">SYS</text>
  </g>

  <!-- Floating Glass Hexagon: Security -->
  <g stroke="rgba(99, 102, 241, 0.4)" stroke-width="1" fill="rgba(99, 102, 241, 0.06)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,15; 0,0" dur="5s" repeatCount="indefinite" />
    <polygon points="730,160 750,160 760,177.3 750,194.6 730,194.6 720,177.3" />
    <text x="740" y="181" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.5)" text-anchor="middle">SEC</text>
  </g>

  <!-- Floating Glass Hexagon: Cloud -->
  <g stroke="rgba(0, 229, 255, 0.3)" stroke-width="1" fill="rgba(0, 229, 255, 0.02)">
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-10; 0,0" dur="7s" repeatCount="indefinite" />
    <polygon points="120,190 140,190 150,207.3 140,224.6 120,224.6 110,207.3" />
    <text x="130" y="211" font-family="monospace" font-size="10" fill="rgba(255,255,255,0.3)" text-anchor="middle">CLD</text>
  </g>

  <!-- Center Floating Glass Card -->
  <g>
    <!-- Gentle hover floating animation -->
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="4s" repeatCount="indefinite" />
    
    <!-- Outer Glow / Shadow -->
    <rect x="195" y="75" width="460" height="150" rx="20" fill="rgba(0,0,0,0.3)" filter="blur(8px)" />
    
    <!-- Main Glass Panel -->
    <rect x="200" y="80" width="450" height="140" rx="16" fill="url(#glass)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" />
    
    <!-- Cyberpunk Accent Border -->
    <rect x="200" y="80" width="450" height="140" rx="16" fill="none" stroke="rgba(0, 229, 255, 0.3)" stroke-width="1" stroke-dasharray="10 20" />

    <!-- Terminal Window "Traffic Lights" -->
    <circle cx="225" cy="105" r="4" fill="#ff5f56" />
    <circle cx="240" cy="105" r="4" fill="#ffbd2e" />
    <circle cx="255" cy="105" r="4" fill="#27c93f" />

    <!-- Typing Text (Revealed by clip-path) -->
    <g clip-path="url(#typing-clip)">
      <text x="425" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="38" font-weight="800" fill="#ffffff" text-anchor="middle">
        Hi, I'm Ayush
        <!-- Blinking Terminal Caret -->
        <tspan fill="#00E5FF">
          |
          <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite" />
        </tspan>
      </text>
    </g>

    <!-- Subtitle (Fades in after the typing finishes) -->
    <text x="425" y="185" font-family="monospace" font-size="16" fill="#8b949e" text-anchor="middle" letter-spacing="4" opacity="0">
      CYBERSECURITY ENTHUSIAST
      <animate attributeName="opacity" values="0;1" dur="1s" begin="2s" fill="freeze" />
    </text>
  </g>
</svg>
