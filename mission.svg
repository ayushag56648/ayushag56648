<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 560" width="100%" height="100%">
  <!-- 
    ========================================================
    🛠️ MISSION CONFIGURATION BLOCK
    Update these values as you learn! The progress bars 
    and animations will automatically update.
    ========================================================
  -->
  <style>
    :root {
      --dsa: 80%;
      --linux: 60%;
      --network: 70%;
      --projects: 50%;
      --docker: 30%;
    }

    /* Typography & Animations */
    .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 800; fill: #ffffff; font-size: 20px; letter-spacing: 1px; }
    .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 600; fill: #8b949e; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }
    .text-primary { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-weight: 600; fill: #E6EDF3; font-size: 15px; }
    .text-mono { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #00E5FF; font-size: 14px; font-weight: bold; }
    
    .glass-panel { fill: rgba(255, 255, 255, 0.03); stroke: rgba(255, 255, 255, 0.08); stroke-width: 1; }
    .glass-card { fill: rgba(255, 255, 255, 0.05); stroke: rgba(0, 229, 255, 0.2); stroke-width: 1; }
    .glass-card-purple { fill: rgba(255, 255, 255, 0.04); stroke: rgba(157, 78, 221, 0.3); stroke-width: 1; }

    /* Progress Bar Filling Animations */
    @keyframes fillDSA { 0% { width: 0; } 100% { width: var(--dsa); } }
    @keyframes fillLinux { 0% { width: 0; } 100% { width: var(--linux); } }
    @keyframes fillNetwork { 0% { width: 0; } 100% { width: var(--network); } }
    @keyframes fillProjects { 0% { width: 0; } 100% { width: var(--projects); } }
    @keyframes fillDocker { 0% { width: 0; } 100% { width: var(--docker); } }

    .bar-dsa { animation: fillDSA 1.5s ease-out forwards; }
    .bar-linux { animation: fillLinux 1.5s ease-out forwards; }
    .bar-network { animation: fillNetwork 1.5s ease-out forwards; }
    .bar-projects { animation: fillProjects 1.5s ease-out forwards; }
    .bar-docker { animation: fillDocker 1.5s ease-out forwards; }
  </style>

  <defs>
    <!-- Dark Background & Glows -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070A0F" />
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FF9D" />
      <stop offset="100%" stop-color="#00E5FF" />
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9D4EDD" />
      <stop offset="100%" stop-color="#00E5FF" />
    </linearGradient>
    
    <!-- Holographic Scan Line -->
    <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(0, 229, 255, 0)" />
      <stop offset="50%" stop-color="rgba(0, 229, 255, 0.15)" />
      <stop offset="100%" stop-color="rgba(0, 229, 255, 0)" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)" />

  <!-- Ambient Blurred Orbs for Depth -->
  <circle cx="100" cy="100" r="150" fill="rgba(0, 229, 255, 0.05)" filter="blur(60px)" />
  <circle cx="750" cy="450" r="180" fill="rgba(157, 78, 221, 0.05)" filter="blur(60px)" />

  <!-- Floating Particles -->
  <g fill="rgba(255, 255, 255, 0.4)">
    <circle cx="200" cy="150" r="1.5"><animateTransform attributeName="transform" type="translate" values="0,0; -10,-20; 0,0" dur="8s" repeatCount="indefinite" /></circle>
    <circle cx="650" cy="100" r="2.0"><animateTransform attributeName="transform" type="translate" values="0,0; 15,15; 0,0" dur="10s" repeatCount="indefinite" /></circle>
    <circle cx="450" cy="400" r="1.0"><animateTransform attributeName="transform" type="translate" values="0,0; -15,10; 0,0" dur="12s" repeatCount="indefinite" /></circle>
  </g>

  <!-- Animated Scan Line -->
  <rect width="100%" height="150" fill="url(#scanline)" opacity="0.4">
    <animate attributeName="y" values="-150;600;-150" dur="8s" repeatCount="indefinite" />
  </rect>

  <!-- ====================================================== -->
  <!-- MAIN GLASS DASHBOARD CONTAINER                         -->
  <!-- ====================================================== -->
  <g transform="translate(30, 30)">
    <!-- Main floating animation -->
    <animateTransform attributeName="transform" type="translate" values="30,30; 30,26; 30,30" dur="6s" repeatCount="indefinite" />
    
    <!-- Outer Glass Panel -->
    <rect width="790" height="500" rx="20" class="glass-panel" />
    
    <!-- Header -->
    <text x="40" y="45" class="title">🎯 Current Mission</text>
    <line x1="40" y1="65" x2="750" y2="65" stroke="rgba(255,255,255,0.05)" stroke-width="2" />

    <!-- ====================================================== -->
    <!-- 1. PRIMARY GOAL CARD (TOP CENTER)                      -->
    <!-- ====================================================== -->
    <g transform="translate(40, 90)">
      <rect width="710" height="70" rx="12" class="glass-card" />
      <!-- Pulsing Indicator -->
      <circle cx="35" cy="35" r="5" fill="#00FF9D">
        <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite" />
      </circle>
      <text x="60" y="30" class="subtitle">PRIMARY OBJECTIVE</text>
      <text x="60" y="52" class="title" fill="#00E5FF">Software Engineering Internship (2027)</text>
    </g>

    <!-- ====================================================== -->
    <!-- 2. CURRENT PROGRESS (LEFT COLUMN)                      -->
    <!-- ====================================================== -->
    <g transform="translate(40, 200)">
      <text x="0" y="0" class="subtitle">SYSTEM CALIBRATION / PROGRESS</text>
      
      <!-- DSA Progress -->
      <g transform="translate(0, 30)">
        <text x="0" y="0" class="text-primary">Data Structures &amp; Algorithms</text>
        <rect x="0" y="10" width="300" height="8" rx="4" fill="rgba(255,255,255,0.06)" />
        <rect x="0" y="10" height="8" rx="4" fill="url(#cyan-glow)" class="bar-dsa" />
        <!-- We use the CSS variable directly in the SVG text using a neat hack, or just hardcode the display text but control the bar with the variable. I'll hardcode text for safety but bar width is dynamic! -->
        <text x="320" y="18" class="text-mono">80%</text>
      </g>

      <!-- Linux Progress -->
      <g transform="translate(0, 75)">
        <text x="0" y="0" class="text-primary">Linux Administration</text>
        <rect x="0" y="10" width="300" height="8" rx="4" fill="rgba(255,255,255,0.06)" />
        <rect x="0" y="10" height="8" rx="4" fill="url(#cyan-glow)" class="bar-linux" />
        <text x="320" y="18" class="text-mono">60%</text>
      </g>

      <!-- Networking Progress -->
      <g transform="translate(0, 120)">
        <text x="0" y="0" class="text-primary">Networking &amp; Security</text>
        <rect x="0" y="10" width="300" height="8" rx="4" fill="rgba(255,255,255,0.06)" />
        <rect x="0" y="10" height="8" rx="4" fill="url(#cyan-glow)" class="bar-network" />
        <text x="320" y="18" class="text-mono">70%</text>
      </g>

      <!-- Projects Progress -->
      <g transform="translate(0, 165)">
        <text x="0" y="0" class="text-primary">Building Real-World Projects</text>
        <rect x="0" y="10" width="300" height="8" rx="4" fill="rgba(255,255,255,0.06)" />
        <rect x="0" y="10" height="8" rx="4" fill="url(#cyan-glow)" class="bar-projects" />
        <text x="320" y="18" class="text-mono">50%</text>
      </g>

      <!-- Docker Progress -->
      <g transform="translate(0, 210)">
        <text x="0" y="0" class="text-primary">Docker &amp; Containerization</text>
        <rect x="0" y="10" width="300" height="8" rx="4" fill="rgba(255,255,255,0.06)" />
        <rect x="0" y="10" height="8" rx="4" fill="url(#cyan-glow)" class="bar-docker" />
        <text x="320" y="18" class="text-mono">30%</text>
      </g>
    </g>

    <!-- Vertical Divider -->
    <line x1="420" y1="200" x2="420" y2="450" stroke="rgba(255,255,255,0.05)" stroke-width="2" />

    <!-- ====================================================== -->
    <!-- 3. CURRENT OBJECTIVES (RIGHT COLUMN TOP)               -->
    <!-- ====================================================== -->
    <g transform="translate(460, 200)">
      <text x="0" y="0" class="subtitle">ACTIVE DIRECTIVES</text>

      <!-- Objective 1 -->
      <g transform="translate(0, 25)">
        <circle cx="10" cy="-5" r="7" fill="none" stroke="#00E5FF" stroke-width="2" />
        <circle cx="10" cy="-5" r="3" fill="#00FF9D"><animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/></circle>
        <text x="30" y="0" class="text-primary">Learn DSA consistently</text>
      </g>
      
      <!-- Objective 2 -->
      <g transform="translate(0, 60)">
        <circle cx="10" cy="-5" r="7" fill="none" stroke="#00E5FF" stroke-width="2" />
        <circle cx="10" cy="-5" r="3" fill="#00FF9D"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
        <text x="30" y="0" class="text-primary">Build real-world projects</text>
      </g>

      <!-- Objective 3 -->
      <g transform="translate(0, 95)">
        <circle cx="10" cy="-5" r="7" fill="none" stroke="#00E5FF" stroke-width="2" />
        <circle cx="10" cy="-5" r="3" fill="#00FF9D"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
        <text x="30" y="0" class="text-primary">Improve Linux infrastructure skills</text>
      </g>

      <!-- Objective 4 -->
      <g transform="translate(0, 130)">
        <circle cx="10" cy="-5" r="7" fill="none" stroke="#00E5FF" stroke-width="2" />
        <circle cx="10" cy="-5" r="3" fill="#00FF9D"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
        <text x="30" y="0" class="text-primary">Master Docker deployments</text>
      </g>

      <!-- Objective 5 -->
      <g transform="translate(0, 165)">
        <circle cx="10" cy="-5" r="7" fill="none" stroke="#00E5FF" stroke-width="2" />
        <circle cx="10" cy="-5" r="3" fill="#00FF9D"><animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/></circle>
        <text x="30" y="0" class="text-primary">Contribute regularly to GitHub</text>
      </g>
    </g>

    <!-- ====================================================== -->
    <!-- 4. NEXT MILESTONE CARD (RIGHT COLUMN BOTTOM)           -->
    <!-- ====================================================== -->
    <g transform="translate(460, 395)">
      <rect width="290" height="65" rx="10" class="glass-card-purple" />
      <rect width="4" height="40" x="10" y="12.5" rx="2" fill="url(#purple-glow)" />
      
      <text x="25" y="27" class="subtitle">NEXT MAJOR MILESTONE</text>
      <text x="25" y="47" class="text-primary" fill="#ffffff">Complete 100 DSA Problems</text>
    </g>
    
  </g>
</svg>
