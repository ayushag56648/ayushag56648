<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 600" width="100%" height="100%">
  <defs>
    <!-- Deep Cybersecurity Charcoal Background -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070A0F" />
      <stop offset="100%" stop-color="#0D1117" />
    </linearGradient>

    <!-- Frosted Glass Effect Gradient -->
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.01)" />
    </linearGradient>

    <!-- Holographic Cyan/Purple Connection Line -->
    <linearGradient id="holo-line" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(0, 229, 255, 0.6)" />
      <stop offset="100%" stop-color="rgba(157, 78, 221, 0.6)" />
    </linearGradient>

    <!-- Soft Glow Filter for the Central Core -->
    <filter id="core-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      .node-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 600; fill: #E6EDF3; }
      .core-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 800; fill: #FFFFFF; letter-spacing: 1px; }
      .glass-pill { fill: url(#glass-grad); stroke: rgba(255, 255, 255, 0.12); stroke-width: 1.5; }
      .holo-connection { fill: none; stroke: url(#holo-line); stroke-width: 1.5; stroke-dasharray: 4 6; }
    </style>
  </defs>

  <!-- Base Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" />

  <!-- Ambient Background Nebulas (Depth) -->
  <circle cx="425" cy="300" r="250" fill="rgba(0, 229, 255, 0.03)" filter="blur(60px)" />
  <circle cx="200" cy="150" r="150" fill="rgba(157, 78, 221, 0.04)" filter="blur(50px)" />
  <circle cx="650" cy="450" r="180" fill="rgba(0, 255, 157, 0.03)" filter="blur(50px)" />

  <!-- Tiny Floating Ambient Particles -->
  <g fill="rgba(255, 255, 255, 0.5)">
    <circle cx="150" cy="200" r="1.5"><animateTransform attributeName="transform" type="translate" values="0,0; -15,-30; 0,0" dur="10s" repeatCount="indefinite" /></circle>
    <circle cx="700" cy="150" r="2.0"><animateTransform attributeName="transform" type="translate" values="0,0; 20,20; 0,0" dur="12s" repeatCount="indefinite" /></circle>
    <circle cx="250" cy="500" r="1.5"><animateTransform attributeName="transform" type="translate" values="0,0; 10,-25; 0,0" dur="14s" repeatCount="indefinite" /></circle>
    <circle cx="650" cy="350" r="1.0"><animateTransform attributeName="transform" type="translate" values="0,0; -20,-10; 0,0" dur="9s" repeatCount="indefinite" /></circle>
  </g>

  <!-- ========================================== -->
  <!-- HOLOGRAPHIC NETWORK LINES (Rendered Below) -->
  <!-- ========================================== -->
  <g class="holo-connection">
    <!-- Core to Inner Diamond -->
    <line x1="425" y1="300" x2="425" y2="140"><animate attributeName="opacity" values="0.1; 0.8; 0.1" dur="4s" begin="0s" repeatCount="indefinite"/></line>
    <line x1="425" y1="300" x2="425" y2="460"><animate attributeName="opacity" values="0.1; 0.8; 0.1" dur="4s" begin="1s" repeatCount="indefinite"/></line>
    <line x1="425" y1="300" x2="250" y2="300"><animate attributeName="opacity" values="0.1; 0.8; 0.1" dur="4s" begin="2s" repeatCount="indefinite"/></line>
    <line x1="425" y1="300" x2="600" y2="300"><animate attributeName="opacity" values="0.1; 0.8; 0.1" dur="4s" begin="3s" repeatCount="indefinite"/></line>
    
    <!-- Inner Diamond to Outer Mesh -->
    <line x1="250" y1="300" x2="80" y2="300"><animate attributeName="opacity" values="0.05; 0.5; 0.05" dur="5s" begin="0.5s" repeatCount="indefinite"/></line>
    <line x1="250" y1="300" x2="230" y2="130"><animate attributeName="opacity" values="0.05; 0.5; 0.05" dur="5s" begin="1.5s" repeatCount="indefinite"/></line>
    <line x1="250" y1="300" x2="230" y2="470"><animate attributeName="opacity" values="0.05; 0.5; 0.05" dur="5s" begin="2.5s" repeatCount="indefinite"/></line>
    <line x1="425" y1="140" x2="230" y2="130"><animate attributeName="opacity" values="0.05; 0.5; 0.05" dur="5s" begin="3.5s" repeatCount="indefinite"/></line>
    <line x1="425" y1="140" x2="620" y2="130"><animate attributeName="opacity" values="0.05; 0.5; 0.05" dur="5s" begin="4.5s" repeatCount="indefinite"/></line>
    <line x1="600" y1="300" x2="770" y2="300"><animate attributeName="opacity" values="0.05; 0.5; 0.05" dur="5s" begin="0.2s" repeatCount="indefinite"/></line>
    <line x1="600" y1="300" x2="620" y2="130"><animate attributeName="opacity" values="0.05; 0.5; 0.05" dur="5s" begin="1.2s" repeatCount="indefinite"/></line>
    <line x1="600" y1="300" x2="620" y2="470"><animate attributeName="opacity" values="0.05; 0.5; 0.05" dur="5s" begin="2.2s" repeatCount="indefinite"/></line>
    <line x1="425" y1="460" x2="230" y2="470"><animate attributeName="opacity" values="0.05; 0.5; 0.05" dur="5s" begin="3.2s" repeatCount="indefinite"/></line>
    <line x1="425" y1="460" x2="620" y2="470"><animate attributeName="opacity" values="0.05; 0.5; 0.05" dur="5s" begin="4.2s" repeatCount="indefinite"/></line>
  </g>

  <!-- ========================================== -->
  <!-- FLOATING ORBITAL GLASS PILLS               -->
  <!-- ========================================== -->

  <!-- Outer Ring: C -->
  <g transform="translate(165, 107)">
    <animateTransform attributeName="transform" type="translate" values="165,107; 165,101; 165,107" dur="4.2s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="-1 65 23; 1 65 23; -1 65 23" dur="7s" repeatCount="indefinite" additive="sum"/>
    <rect x="0" y="0" width="130" height="46" rx="23" fill="rgba(168, 185, 204, 0.05)" filter="url(#core-glow)" />
    <rect x="0" y="0" width="130" height="46" rx="23" class="glass-pill" />
    <image href="https://cdn.simpleicons.org/c/A8B9CC" x="16" y="11" width="24" height="24" />
    <text x="50" y="29" class="node-text">C</text>
  </g>

  <!-- Outer Ring: C++ -->
  <g transform="translate(555, 107)">
    <animateTransform attributeName="transform" type="translate" values="555,107; 555,113; 555,107" dur="5.1s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="1 65 23; -1 65 23; 1 65 23" dur="6.5s" repeatCount="indefinite" additive="sum"/>
    <rect x="0" y="0" width="130" height="46" rx="23" fill="rgba(0, 89, 156, 0.05)" filter="url(#core-glow)" />
    <rect x="0" y="0" width="130" height="46" rx="23" class="glass-pill" />
    <image href="https://cdn.simpleicons.org/cplusplus/00599C" x="16" y="11" width="24" height="24" />
    <text x="50" y="29" class="node-text">C++</text>
  </g>

  <!-- Outer Ring: MySQL -->
  <g transform="translate(165, 447)">
    <animateTransform attributeName="transform" type="translate" values="165,447; 165,440; 165,447" dur="4.8s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="-1.5 65 23; 1.5 65 23; -1.5 65 23" dur="8s" repeatCount="indefinite" additive="sum"/>
    <rect x="0" y="0" width="130" height="46" rx="23" fill="rgba(68, 121, 161, 0.05)" filter="url(#core-glow)" />
    <rect x="0" y="0" width="130" height="46" rx="23" class="glass-pill" />
    <image href="https://cdn.simpleicons.org/mysql/4479A1" x="16" y="11" width="24" height="24" />
    <text x="50" y="29" class="node-text">MySQL</text>
  </g>

  <!-- Outer Ring: Java -->
  <g transform="translate(555, 447)">
    <animateTransform attributeName="transform" type="translate" values="555,447; 555,454; 555,447" dur="5.5s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="1.5 65 23; -1.5 65 23; 1.5 65 23" dur="7.2s" repeatCount="indefinite" additive="sum"/>
    <rect x="0" y="0" width="130" height="46" rx="23" fill="rgba(237, 139, 0, 0.05)" filter="url(#core-glow)" />
    <rect x="0" y="0" width="130" height="46" rx="23" class="glass-pill" />
    <image href="https://cdn.simpleicons.org/openjdk/ED8B00" x="16" y="11" width="24" height="24" />
    <text x="50" y="29" class="node-text">Java</text>
  </g>

  <!-- Far Left: HTML5 -->
  <g transform="translate(15, 277)">
    <animateTransform attributeName="transform" type="translate" values="15,277; 15,270; 15,277" dur="6.1s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="-1 65 23; 1 65 23; -1 65 23" dur="9s" repeatCount="indefinite" additive="sum"/>
    <rect x="0" y="0" width="130" height="46" rx="23" fill="rgba(227, 79, 38, 0.05)" filter="url(#core-glow)" />
    <rect x="0" y="0" width="130" height="46" rx="23" class="glass-pill" />
    <image href="https://cdn.simpleicons.org/html5/E34F26" x="16" y="11" width="24" height="24" />
    <text x="50" y="29" class="node-text">HTML5</text>
  </g>

  <!-- Far Right: JavaScript -->
  <g transform="translate(705, 277)">
    <animateTransform attributeName="transform" type="translate" values="705,277; 705,284; 705,277" dur="5.8s" repeatCount="indefinite" additive="sum"/>
    <animateTransform attributeName="transform" type="rotate" values="1 65 23; -1 65 23; 1 65 23" dur="8.5s" repeatCount="indefinite" additive="sum"/>
    <rect x="0" y="0" width="130" height="46" rx="23" fill="rgba(247, 223, 30, 0.05)" filter="url(#core-glow)" />
    <rect x="0" y="0" width="130" height="46" rx="23" class="glass-pill" />
    <image href="https://cdn.simpleicons.org/javascript/F7DF1E" x="16" y="11" width="24" height="24" />
    <text x="50" y="29" class="node-text">JavaScript</text>
  </g>

  <!-- Inner Diamond: Red Hat (Top) -->
  <g transform="translate(360, 117)">
    <animateTransform attributeName="transform" type="translate" values="360,117; 360,110; 360,117" dur="3.8s" repeatCount="indefinite" additive="sum"/>
    <rect x="0" y="0" width="130" height="46" rx="23" fill="rgba(238, 0, 0, 0.08)" filter="url(#core-glow)" />
    <rect x="0" y="0" width="130" height="46" rx="23" class="glass-pill" />
    <image href="https://cdn.simpleicons.org/redhat/EE0000" x="16" y="11" width="24" height="24" />
    <text x="50" y="29" class="node-text">Red Hat</text>
  </g>

  <!-- Inner Diamond: Ubuntu (Bottom) -->
  <g transform="translate(360, 437)">
    <animateTransform attributeName="transform" type="translate" values="360,437; 360,444; 360,437" dur="4.5s" repeatCount="indefinite" additive="sum"/>
    <rect x="0" y="0" width="130" height="46" rx="23" fill="rgba(233, 84, 32, 0.08)" filter="url(#core-glow)" />
    <rect x="0" y="0" width="130" height="46" rx="23" class="glass-pill" />
    <image href="https://cdn.simpleicons.org/ubuntu/E95420" x="16" y="11" width="24" height="24" />
    <text x="50" y="29" class="node-text">Ubuntu</text>
  </g>

  <!-- Inner Diamond: Bash (Left) -->
  <g transform="translate(185, 277)">
    <animateTransform attributeName="transform" type="translate" values="185,277; 185,272; 185,277" dur="3.5s" repeatCount="indefinite" additive="sum"/>
    <rect x="0" y="0" width="130" height="46" rx="23" fill="rgba(78, 170, 37, 0.08)" filter="url(#core-glow)" />
    <rect x="0" y="0" width="130" height="46" rx="23" class="glass-pill" />
    <image href="https://cdn.simpleicons.org/gnubash/4EAA25" x="16" y="11" width="24" height="24" />
    <text x="50" y="29" class="node-text">Bash</text>
  </g>

  <!-- Inner Diamond: Python (Right) -->
  <g transform="translate(535, 277)">
    <animateTransform attributeName="transform" type="translate" values="535,277; 535,282; 535,277" dur="3.9s" repeatCount="indefinite" additive="sum"/>
    <rect x="0" y="0" width="130" height="46" rx="23" fill="rgba(55, 118, 171, 0.08)" filter="url(#core-glow)" />
    <rect x="0" y="0" width="130" height="46" rx="23" class="glass-pill" />
    <image href="https://cdn.simpleicons.org/python/3776AB" x="16" y="11" width="24" height="24" />
    <text x="50" y="29" class="node-text">Python</text>
  </g>

  <!-- ========================================== -->
  <!-- CENTRAL CORE: LINUX                        -->
  <!-- ========================================== -->
  <g transform="translate(350, 274)">
    <animateTransform attributeName="transform" type="translate" values="350,274; 350,268; 350,274" dur="6s" repeatCount="indefinite" />
    
    <!-- Heavy Core Glow -->
    <rect x="0" y="0" width="150" height="52" rx="26" fill="rgba(0, 229, 255, 0.15)" filter="url(#core-glow)">
      <animate attributeName="opacity" values="0.6; 1; 0.6" dur="3s" repeatCount="indefinite" />
    </rect>
    
    <!-- Core Glass Body -->
    <rect x="0" y="0" width="150" height="52" rx="26" fill="rgba(255, 255, 255, 0.1)" stroke="rgba(0, 229, 255, 0.5)" stroke-width="2" />
    
    <!-- Icon & Text -->
    <image href="https://cdn.simpleicons.org/linux/FCC624" x="20" y="12" width="28" height="28" />
    <text x="60" y="32" class="core-text">Linux</text>
  </g>

</svg>
